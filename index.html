<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef's World Consulting</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;direction:rtl;background:#0d1b33;color:#fff}
.hero{min-height:100vh;background:linear-gradient(135deg,#0d1b33,#1a3c6e);display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero h1{font-size:3rem;margin-bottom:20px;color:#fff}
.hero h1 span{color:#c9a84c}
.hero p{font-size:1.2rem;opacity:.9;margin-bottom:30px}
.btn{display:inline-block;padding:15px 35px;border-radius:30px;text-decoration:none;font-weight:700;margin:5px}
.btn-gold{background:#c9a84c;color:#0d1b33}
.btn-outline{border:2px solid #fff;color:#fff}
.stats{display:flex;justify-content:center;gap:40px;padding:60px 20px;background:#fff;color:#333}
.stat{text-align:center}
.stat .num{font-size:2.5rem;font-weight:900;color:#c9a84c}
.stat .label{font-size:1rem;color:#666}
nav{position:fixed;top:0;right:0;left:0;background:#fff;padding:15px;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1)}
nav a{color:#333;text-decoration:none;margin:0 15px;font-weight:600}
nav a:hover{color:#c9a84c}
</style>
</head>
<body>
<nav style="display:flex;justify-content:center;align-items:center">
<a href="/">الرئيسية</a>
<a href="/services">خدماتنا</a>
<a href="/employers">أصحاب العمل</a>
<a href="/careers">الوظائف</a>
<a href="/success-stories">قصص النجاح</a>
<a href="/contact">اتصل بنا</a>
</nav>
<section class="hero">
<div>
<h1>نحن لا نوظف طهاة فقط<br><span>نحن نبني لك فريق أحلامك الفندقي</span></h1>
<p>أكثر من 14 سنة خبرة في توظيف نخبة الطهاة والكوادر الفندقية حول العالم</p>
<a href="/services" class="btn btn-gold">استكشف خدماتنا</a>
<a href="/contact" class="btn btn-outline">تواصل معنا</a>
</div>
</section>
<section class="stats">
<div class="stat"><div class="num">+14</div><div class="label">سنة خبرة</div></div>
<div class="stat"><div class="num">+1000</div><div class="label">موظف تم توظيفه</div></div>
<div class="stat"><div class="num">+5</div><div class="label">دول نعمل بها</div></div>
<div class="stat"><div class="num">+200</div><div class="label">عميل راضٍ</div></div>
</section>
</body>
</html>
